name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new push comes in —
# keeps Actions minutes reasonable on a tight push cadence.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: Extension (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Test
        run: npm test

  go:
    name: Native host (vet + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: host/go.mod
          cache-dependency-path: host/go.sum
      - name: Vet
        working-directory: host
        run: go vet ./...
      - name: Build
        working-directory: host
        run: go build ./...
      - name: Test
        working-directory: host
        run: go test ./...
